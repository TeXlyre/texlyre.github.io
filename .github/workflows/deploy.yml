name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LATEX_ASSET_PATH: ${{ vars.LATEX_ASSET_PATH || '/core/busytex' }}
      LATEX_REMOTE_ENDPOINT: ${{ vars.LATEX_REMOTE_ENDPOINT || 'https://texlive2026.texlyre.org' }}
      LATEX_COLLECTIONS: ${{ vars.LATEX_COLLECTIONS || 'recommended' }}
      LATEX_PDF_HEIGHT: ${{ vars.LATEX_PDF_HEIGHT || '600' }}
      LATEX_ENGINE: ${{ vars.LATEX_ENGINE || 'pdflatex' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn install

      - name: Install texlyre-busytex
        run: yarn add texlyre-busytex

      - name: Swizzle CodeBlock
        run: |
          if [ ! -f src/theme/CodeBlock/index.js ] && [ ! -f src/theme/CodeBlock/index.jsx ]; then
            yarn swizzle @docusaurus/theme-classic CodeBlock -- --wrap --danger --typescript=false
          else
            echo "CodeBlock already swizzled, skipping."
          fi

      - name: Download BusyTeX assets
        run: yarn texlyre-busytex download-assets ./static/core

      - name: Build website
        run: yarn build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger IndexNow workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'indexnow.yml',
              ref: 'main'
            })